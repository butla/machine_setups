# kitty.conf — adapted by Claude from my Alacritty style, with tweaks

# --- Primary (background / foreground) ---
background  #252525
foreground  #eaeaea

# --- Cursor ---
cursor                  #8e278e
cursor_text_color       #efe143

# Alacritty does not blink by default (no blink config present), so keep 0
cursor_blink_interval   0

# Alacritty cursor.style = "Block"
cursor_shape            block

# --- Selection ---
# Alacritty does not define selection colors, so unset these to let the
# terminal pick sensible defaults based on the foreground/background.
# kitty.conf currently hardcodes #ffffff / #44475a from the old Catppuccin setup.
selection_foreground    none
selection_background    none

# --- Normal colors (color0–color7) ---
# alacritty.toml [colors.normal]
# These were entirely missing from kitty.conf — only brights were set.
color0  #000000
color1  #d54e53
color2  #00aa00
color3  #ffee38
color4  #528bcf
color5  #c397d8
color6  #70c0ba
color7  #eaeaea

# --- Bright colors (color8–color15) ---
# alacritty.toml [colors.bright]
# kitty.conf already had these, but they are reproduced here for completeness.
color8   #666666
color9   #ff3334
color10  #9ec400
color11  #e7c547
color12  #7aa6da
color13  #b77ee0
color14  #54ced6
color15  #ffffff

# Render bold text using the bright color variants (color8–15).
draw_bold_text_with_bright_colors yes

font_family  Noto Sans Mono
font_size    11.0

# Padding matches alacritty.toml [window.padding]: x=2, y=2
window_padding_width  2

# Alacritty starts maximized (startup_mode = "Maximized")
# Kitty doesn't have a direct equivalent; remember_window_size keeps last size.
# To always start maximized, use your WM/compositor instead, or set initial size.
remember_window_size  yes

dynamic_title  yes

scrollback_lines       10000
wheel_scroll_multiplier  5

# Setting to 0 disables hiding, matching Alacritty's behaviour.
mouse_hide_wait  0

enable_audio_bell   no
visual_bell_duration  0.05

live_config_reload  yes

hide_window_decorations yes

# Key mappings

map ctrl+equal change_font_size all +0.5
map ctrl+minus change_font_size all -0.5
# TODO
# map ctrl+shift+t new_tab
# map ctrl+shift+w close_tab

